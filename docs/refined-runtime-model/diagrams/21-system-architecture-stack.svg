<svg width="100%" viewBox="0 0 680 720" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>Cerebra System Architecture Stack</title>
  <desc>Five-layer governance stack with cognitive runtime nested inside, and memory substrate at the foundation. Constitutional layer at top is inviolable; capability bounds are structural; truth tower rules govern derivation; leeway network grants conditional permissions; clutch and catalyst sit inside the leeway-bounded space.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <text class="th" x="340" y="28" text-anchor="middle">Cerebra system architecture stack</text>
  <text class="ts" x="340" y="46" text-anchor="middle">Governance flows top-down; cognition operates in the bounded middle</text>

  <g class="c-red">
    <rect x="40" y="68" width="600" height="50" rx="8" stroke-width="0.5"/>
    <text class="th" x="60" y="92" dominant-baseline="central">Constitutional layer</text>
    <text class="ts" x="60" y="108" dominant-baseline="central">5 to 10 inviolable rules; revokes leeway grants</text>
  </g>

  <g class="c-amber">
    <rect x="40" y="128" width="600" height="50" rx="8" stroke-width="0.5"/>
    <text class="th" x="60" y="152" dominant-baseline="central">Capability bounds</text>
    <text class="ts" x="60" y="168" dominant-baseline="central">Structural; safety from what adapters exist</text>
  </g>

  <g class="c-purple">
    <rect x="40" y="188" width="600" height="50" rx="8" stroke-width="0.5"/>
    <text class="th" x="60" y="212" dominant-baseline="central">Truth tower structural rules</text>
    <text class="ts" x="60" y="228" dominant-baseline="central">Tier constraints; cross-reference requirements</text>
  </g>

  <g class="c-teal">
    <rect x="40" y="248" width="600" height="380" rx="10" stroke-width="0.5"/>
    <text class="th" x="60" y="272" dominant-baseline="central">Leeway network</text>
    <text class="ts" x="60" y="288" dominant-baseline="central">Conditional permissions; pre-action gate plus post-action audit</text>

    <g class="c-blue">
      <rect x="64" y="306" width="552" height="306" rx="10" stroke-width="0.5"/>
      <text class="th" x="80" y="328" dominant-baseline="central">Cognitive runtime</text>
      <text class="ts" x="80" y="344" dominant-baseline="central">Cycle configs loaded here; Bons.ai is one config</text>

      <g class="c-gray">
        <rect x="86" y="360" width="240" height="56" rx="6" stroke-width="0.5"/>
        <text class="th" x="206" y="380" text-anchor="middle" dominant-baseline="central">Clutch</text>
        <text class="ts" x="206" y="398" text-anchor="middle" dominant-baseline="central">Priority rule cascade</text>
      </g>
      <g class="c-gray">
        <rect x="338" y="360" width="240" height="56" rx="6" stroke-width="0.5"/>
        <text class="th" x="458" y="380" text-anchor="middle" dominant-baseline="central">Catalyst</text>
        <text class="ts" x="458" y="398" text-anchor="middle" dominant-baseline="central">Weighted random sampling</text>
      </g>

      <g class="c-gray">
        <rect x="86" y="432" width="240" height="56" rx="6" stroke-width="0.5"/>
        <text class="th" x="206" y="452" text-anchor="middle" dominant-baseline="central">Signal pipeline</text>
        <text class="ts" x="206" y="470" text-anchor="middle" dominant-baseline="central">Six perennial threads</text>
      </g>
      <g class="c-gray">
        <rect x="338" y="432" width="240" height="56" rx="6" stroke-width="0.5"/>
        <text class="th" x="458" y="452" text-anchor="middle" dominant-baseline="central">Prediction layer</text>
        <text class="ts" x="458" y="470" text-anchor="middle" dominant-baseline="central">Expected versus actual</text>
      </g>

      <g class="c-gray">
        <rect x="86" y="504" width="240" height="56" rx="6" stroke-width="0.5"/>
        <text class="th" x="206" y="524" text-anchor="middle" dominant-baseline="central">Working memory</text>
        <text class="ts" x="206" y="542" text-anchor="middle" dominant-baseline="central">Bounded contested slots</text>
      </g>
      <g class="c-gray">
        <rect x="338" y="504" width="240" height="56" rx="6" stroke-width="0.5"/>
        <text class="th" x="458" y="524" text-anchor="middle" dominant-baseline="central">Truth tower</text>
        <text class="ts" x="458" y="542" text-anchor="middle" dominant-baseline="central">Five-tier derivation</text>
      </g>

      <g class="c-gray">
        <rect x="86" y="572" width="492" height="32" rx="6" stroke-width="0.5"/>
        <text class="th" x="332" y="588" text-anchor="middle" dominant-baseline="central">Re-injection loop</text>
      </g>
    </g>
  </g>

  <g class="c-green">
    <rect x="40" y="638" width="600" height="50" rx="8" stroke-width="0.5"/>
    <text class="th" x="60" y="662" dominant-baseline="central">Memory substrate</text>
    <text class="ts" x="60" y="678" dominant-baseline="central">M0 through M10; SKU addressing across all layers</text>
  </g>

  <line x1="340" y1="118" x2="340" y2="128" stroke="#A32D2D" stroke-width="0.5" stroke-dasharray="3 3" marker-end="url(#arrow)"/>
  <line x1="340" y1="178" x2="340" y2="188" stroke="#854F0B" stroke-width="0.5" stroke-dasharray="3 3" marker-end="url(#arrow)"/>
  <line x1="340" y1="238" x2="340" y2="248" stroke="#3C3489" stroke-width="0.5" stroke-dasharray="3 3" marker-end="url(#arrow)"/>
  <line x1="340" y1="628" x2="340" y2="638" stroke="#0F6E56" stroke-width="0.5"/>

  <text class="ts" x="660" y="93" text-anchor="end" fill="#501313">revokes downward</text>
  <text class="ts" x="660" y="697" text-anchor="end" fill="#173404">cognition reads, writes upward</text>
</svg>
