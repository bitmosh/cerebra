<svg width="100%" viewBox="0 0 680 680" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>Signal Pipeline and Prediction Error Loop</title>
  <desc>Outputs flow into signal evaluation across six perennial threads. Composite is triangulated with confidence and signal strength to produce reward. Reward updates catalyst bandit, feeds clutch, and is compared against earlier prediction to produce prediction error. Prediction error updates calibration weights, which loop back into the signal scoring formulas.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <text class="th" x="340" y="28" text-anchor="middle">Signal pipeline and prediction error loop</text>
  <text class="ts" x="340" y="46" text-anchor="middle">Six signals, triangulated reward, prediction error closes the learning loop</text>

  <g class="c-gray">
    <rect x="260" y="68" width="160" height="44" rx="8" stroke-width="0.5"/>
    <text class="th" x="340" y="90" text-anchor="middle" dominant-baseline="central">Step output</text>
  </g>

  <line x1="340" y1="112" x2="340" y2="132" stroke="#5F5E5A" stroke-width="0.5" marker-end="url(#arrow)"/>

  <g class="c-teal">
    <rect x="60" y="132" width="560" height="148" rx="10" stroke-width="0.5"/>
    <text class="th" x="80" y="154" dominant-baseline="central">Signal evaluation: six perennial threads</text>

    <rect x="80" y="174" width="160" height="28" rx="4" fill="#9FE1CB" stroke="#0F6E56" stroke-width="0.5"/>
    <text class="ts" x="90" y="188" dominant-baseline="central" fill="#04342C">COHERENCE 0.82</text>

    <rect x="260" y="174" width="160" height="28" rx="4" fill="#9FE1CB" stroke="#0F6E56" stroke-width="0.5"/>
    <text class="ts" x="270" y="188" dominant-baseline="central" fill="#04342C">GROUNDEDNESS 0.71</text>

    <rect x="440" y="174" width="160" height="28" rx="4" fill="#9FE1CB" stroke="#0F6E56" stroke-width="0.5"/>
    <text class="ts" x="450" y="188" dominant-baseline="central" fill="#04342C">GENERATIVITY 0.68</text>

    <rect x="80" y="210" width="160" height="28" rx="4" fill="#9FE1CB" stroke="#0F6E56" stroke-width="0.5"/>
    <text class="ts" x="90" y="224" dominant-baseline="central" fill="#04342C">RELEVANCE 0.91</text>

    <rect x="260" y="210" width="160" height="28" rx="4" fill="#9FE1CB" stroke="#0F6E56" stroke-width="0.5"/>
    <text class="ts" x="270" y="224" dominant-baseline="central" fill="#04342C">PRECISION 0.76</text>

    <rect x="440" y="210" width="160" height="28" rx="4" fill="#9FE1CB" stroke="#0F6E56" stroke-width="0.5"/>
    <text class="ts" x="450" y="224" dominant-baseline="central" fill="#04342C">EPISTEMIC HUMILITY 0.79</text>

    <text class="ts" x="340" y="258" text-anchor="middle" fill="#085041">weighted mean produces composite 0.78</text>
  </g>

  <line x1="340" y1="280" x2="340" y2="300" stroke="#0F6E56" stroke-width="0.5" marker-end="url(#arrow)"/>

  <g class="c-purple">
    <rect x="60" y="300" width="560" height="74" rx="10" stroke-width="0.5"/>
    <text class="th" x="80" y="322" dominant-baseline="central">Signal triangulator</text>
    <text class="ts" x="80" y="340" dominant-baseline="central">reward = composite multiplied by confidence multiplied by signal strength</text>
    <text class="ts" x="80" y="358" dominant-baseline="central">0.78 times 0.84 times 0.92 equals 0.60</text>
  </g>

  <line x1="180" y1="374" x2="160" y2="404" stroke="#534AB7" stroke-width="0.5" marker-end="url(#arrow)"/>
  <line x1="340" y1="374" x2="340" y2="404" stroke="#534AB7" stroke-width="0.5" marker-end="url(#arrow)"/>
  <line x1="500" y1="374" x2="520" y2="404" stroke="#534AB7" stroke-width="0.5" marker-end="url(#arrow)"/>

  <g class="c-blue">
    <rect x="40" y="404" width="240" height="56" rx="8" stroke-width="0.5"/>
    <text class="th" x="160" y="424" text-anchor="middle" dominant-baseline="central">Catalyst bandit</text>
    <text class="ts" x="160" y="442" text-anchor="middle" dominant-baseline="central">Updates arm reward stats</text>
  </g>

  <g class="c-blue">
    <rect x="280" y="404" width="120" height="56" rx="8" stroke-width="0.5"/>
    <text class="th" x="340" y="424" text-anchor="middle" dominant-baseline="central">Clutch</text>
    <text class="ts" x="340" y="442" text-anchor="middle" dominant-baseline="central">As input signal</text>
  </g>

  <g class="c-coral">
    <rect x="400" y="404" width="240" height="56" rx="8" stroke-width="0.5"/>
    <text class="th" x="520" y="424" text-anchor="middle" dominant-baseline="central">Prediction comparator</text>
    <text class="ts" x="520" y="442" text-anchor="middle" dominant-baseline="central">Actual versus expected</text>
  </g>

  <line x1="520" y1="460" x2="520" y2="492" stroke="#D85A30" stroke-width="0.5" marker-end="url(#arrow)"/>

  <g class="c-coral">
    <rect x="380" y="492" width="280" height="56" rx="8" stroke-width="0.5"/>
    <text class="th" x="520" y="512" text-anchor="middle" dominant-baseline="central">Prediction error</text>
    <text class="ts" x="520" y="530" text-anchor="middle" dominant-baseline="central">delta = actual minus expected</text>
  </g>

  <line x1="520" y1="548" x2="520" y2="580" stroke="#D85A30" stroke-width="0.5" marker-end="url(#arrow)"/>

  <g class="c-amber">
    <rect x="380" y="580" width="280" height="56" rx="8" stroke-width="0.5"/>
    <text class="th" x="520" y="600" text-anchor="middle" dominant-baseline="central">Calibration delta</text>
    <text class="ts" x="520" y="618" text-anchor="middle" dominant-baseline="central">Adjusts per-signal weights</text>
  </g>

  <path d="M 380 608 Q 200 608 200 280" stroke="#854F0B" stroke-width="0.5" fill="none" stroke-dasharray="4 3" marker-end="url(#arrow)"/>

  <text class="ts" x="80" y="500" fill="#854F0B">Calibration feeds</text>
  <text class="ts" x="80" y="516" fill="#854F0B">back into signal</text>
  <text class="ts" x="80" y="532" fill="#854F0B">scoring formulas</text>
  <text class="ts" x="80" y="556" fill="#5F5E5A">Closed learning loop:</text>
  <text class="ts" x="80" y="572" fill="#5F5E5A">predictions trained by</text>
  <text class="ts" x="80" y="588" fill="#5F5E5A">their own error history</text>
</svg>
