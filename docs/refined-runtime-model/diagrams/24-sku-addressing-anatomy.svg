<svg width="100%" viewBox="0 0 680 720" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>SKU Addressing Anatomy</title>
  <desc>Ten-digit SKU address structure showing the six location digits, two entry-index digits, and two type-tag digits, with annotations explaining what each digit encodes. Includes example multi-pointer fanout showing how one memory accumulates multiple SKU addresses.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <text class="th" x="340" y="28" text-anchor="middle">SKU addressing anatomy</text>
  <text class="ts" x="340" y="46" text-anchor="middle">Ten hex digits encoding cognitive position, entry index, and type tags</text>

  <text class="ts" x="80" y="80" fill="#5F5E5A">Address structure</text>

  <g class="c-purple">
    <rect x="80" y="92" width="324" height="56" rx="6" stroke-width="0.5"/>
    <text class="ts" x="242" y="112" text-anchor="middle" dominant-baseline="central" fill="#3C3489">location handling</text>
    <text class="ts" x="242" y="132" text-anchor="middle" dominant-baseline="central" fill="#3C3489">D1 through D6</text>
  </g>

  <g class="c-teal">
    <rect x="412" y="92" width="108" height="56" rx="6" stroke-width="0.5"/>
    <text class="ts" x="466" y="112" text-anchor="middle" dominant-baseline="central" fill="#085041">entry index</text>
    <text class="ts" x="466" y="132" text-anchor="middle" dominant-baseline="central" fill="#085041">D7 D8</text>
  </g>

  <g class="c-amber">
    <rect x="528" y="92" width="108" height="56" rx="6" stroke-width="0.5"/>
    <text class="ts" x="582" y="112" text-anchor="middle" dominant-baseline="central" fill="#854F0B">type tags</text>
    <text class="ts" x="582" y="132" text-anchor="middle" dominant-baseline="central" fill="#854F0B">D9 D10</text>
  </g>

  <text class="ts" x="80" y="172" fill="#5F5E5A">Per-digit semantics</text>

  <g class="c-purple">
    <rect x="80" y="184" width="52" height="44" rx="4" stroke-width="0.5"/>
    <text class="th" x="106" y="207" text-anchor="middle" dominant-baseline="central" fill="#26215C">D1</text>
  </g>
  <text class="ts" x="142" y="200" fill="#26215C">primary cognitive category</text>
  <text class="ts" x="142" y="218" fill="#534AB7">16 options, organized as 4 quadrants</text>

  <g class="c-purple">
    <rect x="80" y="240" width="52" height="44" rx="4" stroke-width="0.5"/>
    <text class="th" x="106" y="263" text-anchor="middle" dominant-baseline="central" fill="#26215C">D2</text>
  </g>
  <text class="ts" x="142" y="256" fill="#26215C">subcategory of D1's topic</text>
  <text class="ts" x="142" y="274" fill="#534AB7">highest-weighted subcategory</text>

  <g class="c-purple">
    <rect x="80" y="296" width="52" height="44" rx="4" stroke-width="0.5"/>
    <text class="th" x="106" y="319" text-anchor="middle" dominant-baseline="central" fill="#26215C">D3</text>
  </g>
  <text class="ts" x="142" y="312" fill="#26215C">subcategory of second-ranked primary</text>
  <text class="ts" x="142" y="330" fill="#534AB7">the orthogonal partner</text>

  <g class="c-purple">
    <rect x="80" y="352" width="52" height="44" rx="4" stroke-width="0.5"/>
    <text class="th" x="106" y="375" text-anchor="middle" dominant-baseline="central" fill="#26215C">D4</text>
  </g>
  <text class="ts" x="142" y="368" fill="#26215C">relationship axis between D2 and D3</text>
  <text class="ts" x="142" y="386" fill="#534AB7">16 types: analogy, enables, contains, etc.</text>

  <g class="c-purple">
    <rect x="80" y="408" width="52" height="44" rx="4" stroke-width="0.5"/>
    <text class="th" x="106" y="431" text-anchor="middle" dominant-baseline="central" fill="#26215C">D5</text>
  </g>
  <text class="ts" x="142" y="424" fill="#26215C">temporal band</text>
  <text class="ts" x="142" y="442" fill="#534AB7">hour, day, week, month, archive, timeless</text>

  <g class="c-purple">
    <rect x="80" y="464" width="52" height="44" rx="4" stroke-width="0.5"/>
    <text class="th" x="106" y="487" text-anchor="middle" dominant-baseline="central" fill="#26215C">D6</text>
  </g>
  <text class="ts" x="142" y="480" fill="#26215C">novelty band</text>
  <text class="ts" x="142" y="498" fill="#534AB7">redundant, confirming, extending, surprising</text>

  <g class="c-teal">
    <rect x="380" y="184" width="52" height="44" rx="4" stroke-width="0.5"/>
    <text class="th" x="406" y="207" text-anchor="middle" dominant-baseline="central" fill="#04342C">D7-D8</text>
  </g>
  <text class="ts" x="442" y="200" fill="#04342C">entry index at location</text>
  <text class="ts" x="442" y="218" fill="#0F6E56">256 entries per unique location</text>

  <g class="c-amber">
    <rect x="380" y="240" width="52" height="44" rx="4" stroke-width="0.5"/>
    <text class="th" x="406" y="263" text-anchor="middle" dominant-baseline="central" fill="#412402">D9</text>
  </g>
  <text class="ts" x="442" y="256" fill="#412402">modality</text>
  <text class="ts" x="442" y="274" fill="#854F0B">text, code, graph, conversation</text>

  <g class="c-amber">
    <rect x="380" y="296" width="52" height="44" rx="4" stroke-width="0.5"/>
    <text class="th" x="406" y="319" text-anchor="middle" dominant-baseline="central" fill="#412402">D10</text>
  </g>
  <text class="ts" x="442" y="312" fill="#412402">provenance</text>
  <text class="ts" x="442" y="330" fill="#854F0B">observed, synthesized, consolidated</text>
  <text class="ts" x="442" y="348" fill="#854F0B">load-bearing for substrate integrity</text>

  <text class="ts" x="80" y="540" fill="#5F5E5A">Example multi-pointer fanout</text>
  <text class="ts" x="80" y="558" fill="#5F5E5A">one memory accumulates multiple SKU addresses based on content distribution</text>

  <g class="c-gray">
    <rect x="80" y="580" width="200" height="56" rx="8" stroke-width="0.5"/>
    <text class="th" x="180" y="600" text-anchor="middle" dominant-baseline="central">Memory record</text>
    <text class="ts" x="180" y="618" text-anchor="middle" dominant-baseline="central">about computational biology</text>
  </g>

  <line x1="280" y1="608" x2="320" y2="600" stroke="#888780" stroke-width="0.5" marker-end="url(#arrow)"/>
  <line x1="280" y1="608" x2="320" y2="640" stroke="#888780" stroke-width="0.5" marker-end="url(#arrow)"/>
  <line x1="280" y1="608" x2="320" y2="680" stroke="#888780" stroke-width="0.5" marker-end="url(#arrow)"/>

  <g class="c-purple">
    <rect x="320" y="580" width="300" height="40" rx="6" stroke-width="0.5"/>
    <text class="ts" x="332" y="600" dominant-baseline="central" fill="#26215C">0x2A.5C.04.B2.04 (MECHANISM x TECHNIQUE)</text>
  </g>

  <g class="c-purple">
    <rect x="320" y="624" width="300" height="40" rx="6" stroke-width="0.5"/>
    <text class="ts" x="332" y="644" dominant-baseline="central" fill="#26215C">0x4C.2A.04.B2.04 (TECHNIQUE x MECHANISM)</text>
  </g>

  <g class="c-purple">
    <rect x="320" y="668" width="300" height="40" rx="6" stroke-width="0.5"/>
    <text class="ts" x="332" y="688" dominant-baseline="central" fill="#26215C">0x32.04.0C.B2.04 (PHENOMENON x TOOL)</text>
  </g>
</svg>
